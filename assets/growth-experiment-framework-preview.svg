    <text x="220" y="644" fill="#7A2525" font-family="Arial, sans-serif" font-size="30" font-weight="700">复盘与下一步</text>
    <text x="220" y="686" fill="#4A5A70" font-family="Arial, sans-serif" font-size="21">放大 / 复测 / 优化</text>
