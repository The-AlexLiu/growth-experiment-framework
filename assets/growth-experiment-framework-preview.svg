    <text x="716" y="644" fill="#185B5B" font-family="Arial, sans-serif" font-size="30" font-weight="700">指标与判断标准</text>
    <text x="716" y="686" fill="#4A5A70" font-family="Arial, sans-serif" font-size="21">CTR / CVR / CPA / ROAS</text>
    <text x="716" y="718" fill="#4A5A70" font-family="Arial, sans-serif" font-size="21">GMV / 毛利 / 回本周期</text>
