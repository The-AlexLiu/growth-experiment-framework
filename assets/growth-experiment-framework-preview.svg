  <text x="260" y="263" fill="#526071" font-family="Arial, sans-serif" font-size="22">问题定义 → 用户假设 → 路径拆解 → 实验设计 → 指标判断 → 复盘反馈</text>

  <g stroke="#667085" stroke-width="5" stroke-linecap="round">
    <line x1="492" y1="423" x2="588" y2="423" marker-end="url(#arrow)"/>
    <line x1="1012" y1="423" x2="1108" y2="423" marker-end="url(#arrow)"/>
    <line x1="1300" y1="505" x2="1300" y2="572" marker-end="url(#arrow)"/>
    <line x1="1108" y1="665" x2="1012" y2="665" marker-end="url(#arrow)"/>
    <line x1="588" y1="665" x2="492" y2="665" marker-end="url(#arrow)"/>
  </g>

  <path d="M112 665H86V423H112" stroke="#8A5A12" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 10" marker-end="url(#feedback-arrow)"/>

