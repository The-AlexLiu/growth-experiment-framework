<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L11 6L1 11" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="feedback-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L11 6L1 11" fill="none" stroke="#8A5A12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#F6F7F9"/>
  <rect x="64" y="48" width="1472" height="804" rx="24" fill="#FFFFFF" stroke="#D7DEE8"/>

  <text x="112" y="130" fill="#172033" font-family="Arial, sans-serif" font-size="46" font-weight="700">Growth Experiment Framework</text>
  <text x="112" y="180" fill="#5A6475" font-family="Arial, sans-serif" font-size="24">新品 / 新业务增长实验拆解框架</text>

  <rect x="112" y="220" width="1376" height="68" rx="12" fill="#F2F5F8" stroke="#E1E7EF"/>
